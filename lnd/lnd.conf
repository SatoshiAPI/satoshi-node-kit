# ============================================================
# lnd.conf — SatoshiAPI Cluster Node Kit
# Pre-baked LND v0.18.3 mainnet configuration
#
# Generated by: satoshi-node-kit
# Network:      mainnet
# Tor:          enabled (via peterdavehello/tor-socks-proxy)
# Autopilot:    disabled (manual channel management)
#
# IMPORTANT: This config is validated against LND v0.18.3-beta.
# Unknown options cause LND to crash on startup — do NOT add
# options without checking `lnd --help` for your version.
# ============================================================

[Application Options]

# ── Node identity ─────────────────────────────────────────
# Set your node alias (shows up in Lightning explorers)
alias=SatoshiClusterNode

# Node color (hex, shows in explorers)
color=#F7931A

# ── Network ───────────────────────────────────────────────
# Listen on all interfaces for P2P connections (inside container)
listen=0.0.0.0:9735

# REST API (secured by macaroons — host-level port binding restricts access)
restlisten=0.0.0.0:8080

# gRPC API (host-level port binding restricts access to localhost)
rpclisten=0.0.0.0:10009

# External IP (set to your public IP for clearnet connectivity)
# externalip=YOUR_PUBLIC_IP:9735

# ── Minimum channel size ──────────────────────────────────
# 100,000 sats minimum — keeps noise out, quality routing in
minchansize=100000

# ── Fee policy ────────────────────────────────────────────
# Base fee in millisatoshis
bitcoin.basefee=1000

# Fee rate in parts per million (0.1%)
bitcoin.feerate=100

# ── Peers ─────────────────────────────────────────────────
# Auto-connect to SatoshiAPI hub node on startup (clearnet)
addpeer=03176f9948d333f9cc1d7d409353f995816e44b3c90a3300b5a08ceba811faf989@74.244.146.41:9735

# Onion alternative (uncomment and comment out the clearnet addpeer above
# if you want Tor-only operation for privacy — see docs/firewall-ports.md)
# addpeer=03176f9948d333f9cc1d7d409353f995816e44b3c90a3300b5a08ceba811faf989@34ok5fboyoxymwrb3mpynhhfgqkna3addrzmdkdzhibrkkdjokrrmpyd.onion:9735

# ── Connection limits ─────────────────────────────────────
# NOTE: `maxpeers` is NOT a valid LND option (as of v0.18.3).
# LND manages peer limits internally. Do not add it.

# ── Logging ───────────────────────────────────────────────
debuglevel=info

# ── Wallet auto-unlock (optional) ────────────────────────
# By default, LND locks the wallet on every restart.
# To enable auto-unlock:
#
#   1. Create a password file inside the LND container:
#      docker exec lnd sh -c 'echo "YOUR_WALLET_PASSWORD" > /root/.lnd/wallet_password'
#      docker exec lnd chmod 600 /root/.lnd/wallet_password
#
#   2. Uncomment the line below:
#      wallet-unlock-password-file=/root/.lnd/wallet_password
#
#   3. Restart LND: docker compose restart lnd
#
# ⚠️ SECURITY: The password file lives inside the Docker volume (lnd_data).
# Anyone with Docker access can read it. For high-security setups, use manual
# unlock or a hardware wallet signer.
#
# wallet-unlock-password-file=/root/.lnd/wallet_password

# ── CLTV ──────────────────────────────────────────────────
# Final CLTV delta for htlc expiry
bitcoin.timelockdelta=144

# ── Stagger initial reconnect ─────────────────────────────
stagger-initial-reconnect=true

[Bitcoin]

# ── Chain ─────────────────────────────────────────────────
bitcoin.active=true
bitcoin.mainnet=true

# ── Backend ───────────────────────────────────────────────
# Neutrino (light client) — no bitcoind required
# Switch to bitcoind if running a full node (see docker-compose.yml --profile full)
bitcoin.node=neutrino

[Neutrino]

# Neutrino peers for fast sync (well-known reliable nodes)
neutrino.addpeer=bb2.breez.technology
neutrino.addpeer=btcd-mainnet.lightning.computer
neutrino.addpeer=mainnet1-btcd.zaphq.io
neutrino.addpeer=mainnet2-btcd.zaphq.io

# ── Channel validation ────────────────────────────────────
# IMPORTANT: neutrino.validatechannels and routing.assumechanvalid
# are MUTUALLY EXCLUSIVE in LND. You cannot enable both.
#
# neutrino.validatechannels=true → verifies channel announcements against
#   the blockchain. Slower initial sync but prevents routing attacks.
#
# routing.assumechanvalid=true → skips validation, faster sync.
#
# For mainnet with real funds, we enable validatechannels (security > speed).
# routing.assumechanvalid is therefore NOT set (see [Routing] section).
neutrino.validatechannels=true

[Tor]

# ── Tor integration ───────────────────────────────────────
tor.active=true

# Connect to the Tor container's SOCKS proxy.
# peterdavehello/tor-socks-proxy exposes Tor on port 9150 (not 9050).
# The Docker service name 'satoshi-tor' resolves via Docker DNS.
tor.socks=satoshi-tor:9150

# Tor control port — used for creating hidden services.
# peterdavehello/tor-socks-proxy exposes control on port 9051.
tor.control=satoshi-tor:9051

# ── Stream isolation ──────────────────────────────────────
# Stream isolation creates separate Tor circuits per connection for
# better privacy. However, it is INCOMPATIBLE with
# tor.skip-proxy-for-clearnet-targets because stream isolation requires
# ALL traffic to go through Tor (so there are distinct circuits to isolate).
#
# Pick ONE:
#   - tor.streamisolation=true  → Maximum privacy, Tor-only
#   - tor.skip-proxy-for-clearnet-targets=true → Hybrid clearnet+Tor
#
# We default to hybrid (clearnet+Tor) for reliability with clearnet peers.
# Uncomment streamisolation and comment out skip-proxy if you want Tor-only.
# tor.streamisolation=true
tor.skip-proxy-for-clearnet-targets=true

# Create v3 hidden service for inbound Tor connections
tor.v3=true

[Autopilot]

# ── Autopilot: DISABLED ───────────────────────────────────
# Manual channel management required for SatoshiAPI cluster
autopilot.active=false

[Routing]

# ── Routing ───────────────────────────────────────────────
# DO NOT enable routing.assumechanvalid when neutrino.validatechannels=true.
# They conflict — LND will reject the configuration.
# See the [Neutrino] section for the explanation.
#
# If you need faster sync and accept the security trade-off, disable
# neutrino.validatechannels and uncomment the line below:
# routing.assumechanvalid=true

[Protocol]

# ── Protocol features ─────────────────────────────────────
# Enable wumbo channels (for large commitments)
protocol.wumbo-channels=true

# Enable zero-conf channels (requires trusted counterparty)
# protocol.zero-conf-channel-open=true

# NOTE: protocol.anchors is NOT a valid LND v0.18.3 option.
# Anchor channels are enabled by default in LND v0.16+.
# Adding it causes a startup crash. Do not uncomment.
# protocol.anchors=true
