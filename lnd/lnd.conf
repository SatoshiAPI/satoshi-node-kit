# ============================================================
# lnd.conf — SatoshiAPI Cluster Node Kit
# Pre-baked LND mainnet configuration
#
# Generated by: satoshi-node-kit
# Network:      mainnet
# Tor:          enabled
# Autopilot:    disabled (manual channel management)
# ============================================================

[Application Options]

# ── Node identity ─────────────────────────────────────────
# Set your node alias (shows up in Lightning explorers)
alias=SatoshiClusterNode

# Node color (hex, shows in explorers)
color=#F7931A

# ── Network ───────────────────────────────────────────────
# Listen on all interfaces for P2P connections
listen=0.0.0.0:9735

# REST API (secured by macaroons)
restlisten=0.0.0.0:8080

# gRPC API
rpclisten=0.0.0.0:10009

# External IP (set to your public IP for clearnet connectivity)
# externalip=YOUR_PUBLIC_IP:9735

# ── Minimum channel size ──────────────────────────────────
# 100,000 sats minimum — keeps noise out, quality routing in
minchansize=100000

# ── Fee policy ────────────────────────────────────────────
# Base fee in millisatoshis
bitcoin.basefee=1000

# Fee rate in parts per million (0.1%)
bitcoin.feerate=100

# ── Peers ─────────────────────────────────────────────────
# Auto-connect to SatoshiAPI hub node on startup (clearnet)
addpeer=03176f9948d333f9cc1d7d409353f995816e44b3c90a3300b5a08ceba811faf989@74.244.146.41:9735

# Onion alternative (uncomment to prefer Tor)
# addpeer=03176f9948d333f9cc1d7d409353f995816e44b3c90a3300b5a08ceba811faf989@34ok5fboyoxymwrb3mpynhhfgqkna3addrzmdkdzhibrkkdjokrrmpyd.onion:9735

# ── Connection limits ─────────────────────────────────────
# Maximum peers
maxpeers=100

# ── Logging ───────────────────────────────────────────────
debuglevel=info

# ── Wallet ────────────────────────────────────────────────
# Wallet unlock password file path (optional — remove for interactive prompt)
# wallet-unlock-password-file=/root/.lnd/wallet_password

# ── CLTV ──────────────────────────────────────────────────
# Final CLTV delta for htlc expiry
bitcoin.timelockdelta=144

# ── Stagger initial reconnect ─────────────────────────────
stagger-initial-reconnect=true

[Bitcoin]

# ── Chain ─────────────────────────────────────────────────
bitcoin.active=true
bitcoin.mainnet=true

# ── Backend ───────────────────────────────────────────────
# Neutrino (light client) — no bitcoind required
# Switch to bitcoind if running a full node (see docker-compose.yml --profile full)
bitcoin.node=neutrino

[Neutrino]

# Neutrino peers for fast sync (well-known reliable nodes)
neutrino.addpeer=bb2.breez.technology
neutrino.addpeer=btcd-mainnet.lightning.computer
neutrino.addpeer=mainnet1-btcd.zaphq.io
neutrino.addpeer=mainnet2-btcd.zaphq.io

# Validate Neutrino headers
neutrino.validatechannels=false

[Tor]

# ── Tor integration ───────────────────────────────────────
tor.active=true
tor.socks=127.0.0.1:9050
tor.control=127.0.0.1:9051

# Stream isolation for privacy
tor.streamisolation=true

# Create v3 hidden service for inbound Tor connections
tor.v3=true

# Allow both clearnet and onion connections
tor.skip-proxy-for-clearnet-targets=true

[Autopilot]

# ── Autopilot: DISABLED ───────────────────────────────────
# Manual channel management required for SatoshiAPI cluster
autopilot.active=false

[Routing]

# ── Routing ───────────────────────────────────────────────
# Use Assume Channel Valid for faster startup (Neutrino only)
routing.assumechanvalid=true

[Protocol]

# ── Protocol features ─────────────────────────────────────
# Enable wumbo channels (for large commitments)
protocol.wumbo-channels=true

# Enable zero-conf channels (requires trusted counterparty)
# protocol.zero-conf-channel-open=true

# Enable anchors (recommended for security)
protocol.anchors=true
